<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Exemplar</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 500px;
            margin: 40px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        form label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        form input, form select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button, .cancel-btn {
            width: 100%;
            padding: 10px;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        button {
            background-color: #007BFF;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .cancel-btn {
            background-color: #6c757d;
        }

        .cancel-btn:hover {
            background-color: #5a6268;
        }

        .link {
            text-align: right;
            margin-bottom: 15px;
        }

        .link a {
            text-decoration: none;
            color: #007BFF;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .erro {
            background-color: #ffe5e5;
            color: #cc0000;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Adicionar Exemplar</h1>

    <div th:if="${erro}" class="erro">
        <p th:text="${erro}"></p>
    </div>

    <form th:action="@{/exemplares/salvar}" th:object="${exemplar}" method="post">

        <label>Código:</label>
        <input type="number" th:field="*{cod}" required/>

        <label>Status:</label>
        <select th:field="*{status}" required>
            <option th:value="Disponivel">Disponível</option>
            <option th:value="Emprestado">Emprestado</option>
        </select>

        <label>Livro:</label>
        <select th:field="*{livro.id}">
            <option value="" disabled selected>-- Selecione um livro --</option>
            <option th:each="livro : ${livros}" th:value="${livro.id}" th:text="${livro.titulo}"></option>
        </select>

        <button type="submit">Salvar</button>
        <a th:href="@{/exemplares/lista}" class="cancel-btn">Cancelar</a>
    </form>

</div>

</body>
</html>
