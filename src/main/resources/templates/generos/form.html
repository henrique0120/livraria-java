<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Gênero</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f8; margin: 0; padding: 0; }
        .container { width: 400px; margin: 40px auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; }
        .buttons { display: flex; gap: 10px; }
        .buttons button, .buttons a button { flex: 1; padding: 10px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .save-btn { background-color: #007BFF; color: white; }
        .save-btn:hover { background-color: #0056b3; }
        .cancel-btn { background-color: #6c757d; color: white; text-decoration: none; display: inline-block; text-align: center; }
        .cancel-btn:hover { background-color: #5a6268; }
    </style>
</head>
<body>
<div class="container">
    <h1>Adicionar Gênero</h1>
    <form th:action="@{/generos/salvar}" th:object="${genero}" method="post">
        <label>Nome do Gênero:</label>
        <input type="text" th:field="*{nome}" required/>

        <div class="buttons">
            <button type="submit" class="save-btn">Salvar</button>
            <a href="/livros/form"><button type="button" class="cancel-btn">Cancelar</button></a>
        </div>
    </form>
</div>
</body>
</html>
